<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario about you</title>
</head>
<body>
    <h2>Registro de Información Personal</h2>

<form>
    <label>Nombre:</label><br>
    <input type="text" name="nombre">
    <br><br>

    <label>Edad:</label><br>
    <input type="number" name="edad">
    <br><br>

    <label>Fecha de nacimiento:</label><br>
    <input type="date" name="fecha">
    <br><br>

    <label>Color favorito:</label>
    <br>
    <input type="color" name="color">
    <br><br>

    <label>Comida favorita:</label>
    <br>
    <input type="text" name="comida"
    ><br><br>

    <label>Hobbie favorito:</label>
    <br>
    <input type="text" name="hobbie">
    <br><br>

    <label>¿Tiene mascotas?</label>
    <br>
    <input type="checkbox" name="mascota" value="gatos"> Gatos
    <br>
    <input type="checkbox" name="mascota" value="perros"> Perros
    <br>
    <input type="checkbox" name="mascota" value="ambos"> Ambos
    <br>
    <input type="checkbox" name="mascota" value="ninguno"> Ninguno
    <br><br>

    <input type="submit" value="Enviar">

</form>
</body>
</html>
